name: Daily Mass Readings Video

on:
  schedule:
    # 3:00 AM ACST (UTC+9:30) = 17:30 UTC
    # During ACDT (UTC+10:30, Oct–Apr) this fires at 4:00 AM Adelaide — acceptable
    - cron: "30 17 * * *"
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation fonts-freefont-ttf

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Download Crimson Text fonts
        run: |
          mkdir -p assets/fonts
          BASE="https://github.com/googlefonts/CrimsonText/raw/main/fonts/ttf"
          curl -fsSL "$BASE/CrimsonText-Regular.ttf" -o assets/fonts/CrimsonText-Regular.ttf || true
          curl -fsSL "$BASE/CrimsonText-Bold.ttf"    -o assets/fonts/CrimsonText-Bold.ttf    || true
          curl -fsSL "$BASE/CrimsonText-Italic.ttf"  -o assets/fonts/CrimsonText-Italic.ttf  || true
          # Copy Liberation Serif as fallback if Crimson Text download failed
          for style in Regular Bold Italic; do
            if [ ! -s "assets/fonts/CrimsonText-${style}.ttf" ]; then
              echo "Using Liberation Serif as fallback for CrimsonText-${style}"
              cp /usr/share/fonts/truetype/liberation/LiberationSerif-Regular.ttf \
                 "assets/fonts/CrimsonText-${style}.ttf"
            fi
          done

      - name: Run pipeline
        run: python main.py

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-output-${{ github.run_id }}
          path: tmp/
          retention-days: 2
